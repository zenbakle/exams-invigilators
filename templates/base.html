<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invigilation Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f3f4f6;
      color: #111827;
    }

    .page {
      max-width: 1024px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      margin-bottom: 24px;
    }

    h1,
    h2 {
      margin: 0 0 12px;
    }

    nav a {
      margin-right: 16px;
      text-decoration: none;
      color: #1d4ed8;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.08);
      padding: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    select,
    input[type=text] {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
    }

    button {
      background: #2563eb;
      border: none;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th,
    td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    th {
      background: #eef2ff;
    }

    .small-note {
      color: #6b7280;
      font-size: 0.95rem;
    }

    .actions {
      margin-top: 16px;
    }

    .actions a {
      display: inline-block;
      margin-right: 12px;
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <h1>Invigilation Assignments Website</h1>
    </header>
    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>

</html>
