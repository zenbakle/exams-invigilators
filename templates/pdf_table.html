<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>{{ title }}</title>
  <style>
    @page {
      size: A4 landscape;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      color: #111;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th,
    td {
      border: 1px solid #777;
      padding: 8px;
    }

    th {
      background: #f0f0f0;
    }

    td {
      vertical-align: top;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h1>{{ title }}</h1>
  <div style="margin-bottom:16px; padding:12px; background:#f9fafb; border:1px solid #e5e7eb; border-radius:8px;">
    <strong>Time key:</strong>
    <div>Morning: 8:30am - 11:30am</div>
    <div>Mid-day: 12:00pm - 2:30pm</div>
    <div>Afternoon: 3:00pm - 6:00pm</div>
  </div>
  <table>
    <thead>
      <tr>
        {% for col in columns %}
        <th>{{ col.replace('_', ' ').title() }}</th>
        {% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        {% for col in columns %}
        <td>{{ row[col] }}</td>
        {% endfor %}
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>

</html>
